name: Run stock tracker

on:
  schedule:
    # Times are UTC and don't shift for daylight saving automatically.
    # 13:35 UTC = 9:35am ET during EDT (summer); drifts to 8:35am ET during
    # EST (winter, roughly Nov-Mar). Same for the close run below.
    - cron: "35 13 * * 1-5"  # ~market open
    - cron: "5 20 * * 1-5"   # ~market close
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Determine session label
        id: session
        run: |
          if [ "${{ github.event.schedule }}" = "35 13 * * 1-5" ]; then
            echo "label=open" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "5 20 * * 1-5" ]; then
            echo "label=close" >> "$GITHUB_OUTPUT"
          else
            echo "label=manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tracker
        run: python main.py ${{ steps.session.outputs.label }}

      - name: Commit updated data
        run: |
          git config user.name "stock-tracker-bot"
          git config user.email "actions@github.com"
          git add history.csv commodities_history.csv world_news_log.csv daily_movers.json
          git diff --cached --quiet && exit 0
          git commit -m "Update tracker data (${{ steps.session.outputs.label }})"
          # Retry a few times in case someone else pushed while this run was working -
          # rebase onto the latest remote state and try again rather than failing outright.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest origin/main..."
            git fetch origin main
            git rebase origin/main
          done
          git push
